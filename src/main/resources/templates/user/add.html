<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить пользователя</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="container">
        <h1>Добавление пользователя</h1>
        <form method="post" th:action="@{/users/save}" th:object="${user}">
            <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <input type="text" th:field="*{name}" name="name" placeholder="Имя" required>
            </div>
            <div class="form-group">
                <input type="text" th:field="*{surname}" name="surname" placeholder="Фамилия" required>
            </div>
            <div class="form-group">
                <input type="text" th:field="*{phone}" name="phone" placeholder="Телефон" required>
            </div>
            <div class="form-group">
                <input type="email" th:field="*{email}" name="email" placeholder="Эл. почта" required>
            </div>
            <div class="form-group">
                <input type="password" th:field="*{password}" name="password" placeholder="Пароль" required>
            </div>
            <button type="submit" class="btn">Сохранить</button>
            <div class="button-group">
                <a href="/users" class="btn">Вернуться к списку</a>
                <a href="/" class="btn">На главную</a>
            </div>
        </form>
    </div>
</body>
</html>
