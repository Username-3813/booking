<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить автосервис</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="container">
        <h1>Добавление автосервиса</h1>
        <form method="post" th:action="@{/locations/save}" th:object="${location}">
            <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <input type="text" th:field="*{city}" name="city" placeholder="Город" required>
            </div>
            <div class="form-group">
                <input type="text" th:field="*{street}" name="street" placeholder="Улица" required>
            </div>
            <div class="form-group">
                <input type="text" th:field="*{house}" name="house" placeholder="№ Дома" required>
            </div>
            <button type="submit" class="btn">Сохранить</button>
            <div class="button-group">
                <a class="btn" th:href="@{/locations}">Вернуться к списку</a>
                <a href="/" class="btn">На главную</a>
            </div>
        </form>
    </div>
</body>
</html>
